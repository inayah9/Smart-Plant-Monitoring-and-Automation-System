
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <div class="status-box">
            <h1>Welcome to Smart Plant Monitoring</h1>
            <p class="subtitle">Add your plant to get started</p>

            <form action="/add_plant" method="post" class="plant-form">
                <label for="name">Plant Name</label>
                <input type="text" id="name" name="name" required>

                <label for="type">Plant Type</label>
                <input type="text" id="type" name="type" required>

                <label for="date_planted">Date Planted</label>
                <input type="date" id="date_planted" name="date_planted" required>

                <label for="last_watered">Last Watered</label>
                <input type="date" id="last_watered" name="last_watered" required>

                <button type="submit">Add Plant</button>
            </form>
        </div>
    </div>
</body>
</html>
